<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utwórz konto | Wyzwanie Dnia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-form-section">
                <div class="auth-logo-circle"></div>
    
    <!-- BLOK REJESTRACJI -->
    <div id="register-view">
        <h1>Create an account</h1>
        <p class="auth-subtitle">Already have an account? <a href="#" class="toggle-link" onclick="toggleLogin()">Log in</a></p>
        
        <form id="register-form">
            <div class="form-row">
                <div class="form-group"><label>First name</label><input type="text" name="firstname" id="firstname" required></div>
                <div class="form-group"><label>Last name</label><input type="text" name="lastname" id="lastname" required></div>
            </div>
            <div class="form-group">
                <label>Email address</label>
                <input type="email" name="email" id="email" required>
            </div>
               <div class="form-row">
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" name="password" id="password">
                        </div>
                        <div class="form-group">
                            <label>Confirm your password</label>
                            <input type="password" name="confirm-password" id="confirm-password">
                        </div>
                    </div>
                      <p class="form-hint">Use 8 or more characters with a mix of letters, numbers & symbols</p>

                    <div class="checkbox-group">
                        <input type="checkbox" id="show-password" onclick="showPassword()">
                        <label for="show-password" >Show password</label>
                    </div>
            <div class="form-footer">
                <a href="#" class="toggle-link link-secondary" onclick="toggleLogin()">log in instead</a>
                <button type="button" class="btn-create-account" onclick="rejestracjaUzytkownika()">Create an account</button>
            </div>
        </form>
    </div>

    <!-- BLOK LOGOWANIA (domyślnie ukryty) -->
    <div id="login-view" style="display: none;">
        <h1>Login to account</h1>
        <p class="auth-subtitle">Don't have an account? <a href="#" class="toggle-link" onclick="toggleRegister()">Sign up</a></p>
        
        <form id="login-form">
            <div class="form-group">
                <label>Email address</label>
                <input type="email" name="email" id="loginEmail" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" id="loginPassword" required>
            </div>
            <div class="form-footer">
                <a href="#" class="toggle-link link-secondary" onclick="toggleRegister()">register instead</a>
                <button type="button" class="btn-create-account" onclick="zaloguj()">Login</button>
            </div>
        </form>
    </div>
    </div>
        </div>

        <div class="auth-bottom-nav">
            <div class="language-picker">
                English (united States) <span>▼</span>
            </div>
            <div class="bottom-helper-links">
                <a href="#">Help</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
