<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utwórz konto | Wyzwanie Dnia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-form-section">
                <!-- Szare kółko (placeholder na logo/ikonę) -->
                <div class="auth-logo-circle"></div>
                
                <h1>Create an account</h1>
                <p class="auth-subtitle">Already have an account? <a href="#">Log in</a></p>

                <form class="register-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>First name</label>
                            <input type="text" name="firstname">
                        </div>
                        <div class="form-group">
                            <label>Last name</label>
                            <input type="text" name="lastname">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email address</label>
                        <input type="email" name="email" class="full-width">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" name="password">
                        </div>
                        <div class="form-group">
                            <label>Confirm your password</label>
                            <input type="password" name="confirm-password">
                        </div>
                    </div>

                    <p class="form-hint">Use 8 or more characters with a mix of letters, numbers & symbols</p>

                    <div class="checkbox-group">
                        <input type="checkbox" id="show-password">
                        <label for="show-password">Show password</label>
                    </div>

                    <div class="form-footer">
                        <a href="index.html" class="link-secondary">log in instead</a>
                        <button type="submit" class="btn-create-account">Create an account</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="auth-bottom-nav">
            <div class="language-picker">
                English (united States) <span>▼</span>
            </div>
            <div class="bottom-helper-links">
                <a href="#">Help</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
            </div>
        </div>
    </div>

</body>
</html>
